<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../template_integration.css">
    <link rel="stylesheet" href="sas_card.css">
</head>
<body>
    <header>
        <div id="div_header">
            <div class="state_logo">
                <img src="../images\logo-ANS.svg" alt="logo-ANS">
            </div>
            <div class="state_logo">
                <img src="../images/logo-min_sante_acces_soins.svg" alt="logo-ANS">
            </div>
            <div id="header_title">
                <h1>Mock d'interface Plateforme numérique du SAS</h1>
                <h2>Présentation des Cas d'usages</h2>
            </div>
        </div>
    </header>
    <div class="main">
        <div id="div_filter">
            <div id="div_filter_act_spe">
                <h3>Filtrer par activités opérationnelles</h3>
                <input class="npt_act_ope" type="checkbox"><label for="npt_act_ope">Médecine générale</label>
                <input class="npt_act_ope" type="checkbox"><label for="npt_act_ope">Médecine générale à orientation Diabéologie</label>
                <input class="npt_act_ope" type="checkbox"><label for="npt_act_ope">Médecine générale à orientation Gériatrie, Gérontologie</label>
                <input class="npt_act_ope" type="checkbox"><label for="npt_act_ope">Médecine générale à orientation Gynécologie médicale</label>
                <input class="npt_act_ope" type="checkbox"><label for="npt_act_ope">Médecine générale à orientation Médecine pédiatrique</label>
                <input class="npt_act_ope" type="checkbox"><label for="npt_act_ope">Médecine générale à orientation Médecine vasculaire (Angiologie, Phlébologie)</label>
            </div>
            <div id="div_filter_act_spe">
                <h3>Filtrer par acte spécifique</h3>
                <input class="npt_act_spe" type="checkbox"><label for="npt_act_spe">ESG (Electrocardiographie)</label>
                <input class="npt_act_spe" type="checkbox"><label for="npt_act_spe">Interruption volontaire de grossesse (IVG) médicamenteuse</label>
                <input class="npt_act_spe" type="checkbox"><label for="npt_act_spe">Contention souple d'articulation</label>
                <input class="npt_act_spe" type="checkbox"><label for="npt_act_spe">Echographie clinique ciblée</label>
                <input class="npt_act_spe" type="checkbox"><label for="npt_act_spe">Suture cutanées</label>
                <input class="npt_act_spe" type="checkbox"><label for="npt_act_spe">Pose de plâtres ou résines, orthèse</label>
                <input class="npt_act_spe" type="checkbox"><label for="npt_act_spe">Echographie de l'appareil locomoteur</label>
            </div>
                <div id="div_filter_patient_age">
                <h3>Filtrer par acte spécifique</h3>
                <input class="npt_patient_age" type="checkbox"><label for="npt_patient_age">Moins 6 ans</label>
                <input class="npt_patient_age" type="checkbox"><label for="npt_patient_age">Plus de 6 ans</label>
            </div>
        </div>
        <div id="div_display_card_pas_ror_list"></div>
    </div>

    <script src="sas_card_ps_ror_management.js"></script>
</body>
</html>
