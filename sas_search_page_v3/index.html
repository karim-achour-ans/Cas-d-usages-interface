      /* ── Layout résultats / carte ── */
      .sas-results-layout {
        display: flex;
        align-items: flex-start;
        gap: 1rem;
      }

      /* Colonne liste : 60% */
      .sas-results-list {
        flex: 0 0 60%;
        max-width: 60%;
        min-width: 0;
      }

      /* Colonne carte : 40%, sticky, pleine hauteur viewport */
      .sas-results-map {
        flex: 0 0 calc(40% - 1rem);
        max-width: calc(40% - 1rem);
        position: sticky;
        top: 0;
        height: 100vh;
      }

      /* Override DSFR fr-card pour pleine hauteur */
      .sas-results-map .fr-card {
        height: 100% !important;
        min-height: unset !important;
        padding: 0 !important;
        margin: 0 !important;
        border-radius: 0.5rem;
        overflow: hidden;
        border: none !important;
        display: block !important;
      }

      .sas-map-iframe {
        width: 100%;
        height: 100%;
        border: none;
        display: block;
      }

      /* Sur mobile : carte en dessous, hauteur fixe */
      @media (max-width: 768px) {
        .sas-results-layout  { flex-direction: column; }
        .sas-results-list,
        .sas-results-map     { flex: none; max-width: 100%; width: 100%; }
        .sas-results-map     { position: static; height: 300px; }

<script type="module">
  import { buildOffersFromBundle } from './use_cases_health_offers/services_js/assembler.js';
  import { buildOrgOffersFromBundle } from './use_cases_health_offers/services_js/assembler-org.js';
  import { renderLoading, renderError } from './use_cases_health_offers/services_js/renderer.js';
  import { renderMergedOffers } from './use_cases_health_offers/services_js/renderer-org.js';

  const PS_BUNDLE_URL  = './use_cases_health_offers/data/ps_indiv/ExampleBundlePSIndiv.json';
  const ORG_BUNDLE_URL = './use_cases_health_offers/data/organization/ExampleBundleOrganisation.json';

  async function init() {
    renderLoading();

    try {
      const [psOffers, orgOffers] = await Promise.allSettled([
        buildOffersFromBundle(PS_BUNDLE_URL),
        buildOrgOffersFromBundle(ORG_BUNDLE_URL),
      ]);

      const ps  = psOffers.status === 'fulfilled' ? psOffers.value : [];
      const org = orgOffers.status === 'fulfilled' ? orgOffers.value : [];

      if (psOffers.status === 'rejected') {
        console.warn('[init] PS bundle failed:', psOffers.reason);
      }

      if (orgOffers.status === 'rejected') {
        console.warn('[init] Org bundle failed:', orgOffers.reason);
      }

      renderMergedOffers(ps, org);

    } catch (error) {
      console.error('[init] Fatal error:', error);
      renderError(error);
    }
  }

  init();
</script>

<!-- Rayon slider -->
<script>
(function () {
  var PRESETS = [5, 14, 25, 50, 100];
  var MIN_PX = 40;
  var MAX_PX = 340;

  function pxFromKm(km) {
    return Math.round(MIN_PX + (km - 1) / 99 * (MAX_PX - MIN_PX));
  }

  function updateRayon(v) {
    v = parseInt(v, 10);

    document.getElementById('map-rayon-val').innerHTML =
      v + '<span>km</span>';

    var pct = Math.round((v - 1) / 99 * 100);

    document.getElementById('map-rayon-slider')
      .style.setProperty('--pct', pct + '%');

    var px = pxFromKm(v);
    var circle = document.getElementById('map-radius-circle');

    if (circle) {
      circle.style.width = px + 'px';
      circle.style.height = px + 'px';
    }

    PRESETS.forEach(function (p) {
      var el = document.getElementById('mpt-' + p);
      if (el) el.classList.toggle('on', p === v);
    });

    document.dispatchEvent(
      new CustomEvent('rayon:change', {
        detail: { km: v }
      })
    );
  }

  function setRayon(v) {
    document.getElementById('map-rayon-slider').value = v;
    updateRayon(v);
  }

  window.updateRayon = updateRayon;
  window.setRayon = setRayon;

  updateRayon(14);
})();
</script>

<!-- Sync localisation → adresse départ itinéraire -->
<script>
(function () {
  function syncLocationToPanel() {
    const locInput     = document.getElementById('search-location');
    const patientInput = document.getElementById('panel-patient-address');
    if (locInput && patientInput) {
      const val = locInput.value.trim();
      if (val) patientInput.value = val;
    }
  }

  /* Sync à l'ouverture de chaque card (délégation déjà en place dans panel.js) */
  document.addEventListener('click', function (e) {
    if (e.target.closest('.js-open-panel')) {
      /* Délai pour que panel.js ait fini de populater et que l'adresse soit présente */
      setTimeout(function () {
        syncLocationToPanel();
        if (typeof window._panelCalculateItinerary === 'function') {
          window._panelCalculateItinerary();
        }
      }, 120);
    }
  });

  /* Sync en temps réel quand l'utilisateur change la localisation */
  document.addEventListener('DOMContentLoaded', function () {
    document.getElementById('search-location')
      ?.addEventListener('input', syncLocationToPanel);
  });
})();
</script>

<script>
(function () {

  /* ─── état module ─── */
  let _map       = null;   // instance Leaflet
  let _route     = null;   // polyline courante
  let _initiated = false;  // carte déjà initialisée ?

  /* ─── 1. Géocodage IGN ─── */
  async function geocode(address) {
    const url =
      'https://data.geopf.fr/geocodage/search?q=' +
      encodeURIComponent(address) + '&limit=1';
    const res  = await fetch(url);
    const data = await res.json();
    if (!data.features?.length)
      throw new Error('Adresse introuvable : ' + address);
    return data.features[0].geometry.coordinates; // [lon, lat]
  }

  /* ─── 2. Navigation IGN ─── */
  async function getItinerary(sLon, sLat, eLon, eLat, profile) {
    const profileMap = { car: 'car', bike: 'bicycle', foot: 'pedestrian' };
    const p   = profileMap[profile] || 'car';
    const url = 'https://data.geopf.fr/navigation/itineraire?' +
      new URLSearchParams({
        resource    : 'bdtopo-osrm',
        start       : sLon + ',' + sLat,
        end         : eLon + ',' + eLat,
        profile     : p,
        optimization: 'fastest',
        getSteps    : 'true',
        getBbox     : 'true',
        distanceUnit: 'kilometer',
        timeUnit    : 'minute',
        crs         : 'EPSG:4326'
      });
    const res = await fetch(url);
    if (!res.ok) throw new Error('Erreur API navigation (code ' + res.status + ')');
    return res.json();
  }

  /* ─── 3. Init carte (paresseuse) ─── */
  function initMap() {
    if (_initiated) return;
    _initiated = true;

    _map = L.map('panel-map').setView([46.6, 2.3], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap'
    }).addTo(_map);
  }

  /* ─── 4. Étapes HTML ─── */
  function buildStepsHtml(portions) {
    if (!portions?.length || !portions[0].steps) return '';

    const tr = {
      depart            : 'Départ',
      turn              : 'Tourner',
      continue          : 'Continuer',
      'end of road'     : 'Fin de la route',
      'new name'        : 'Continuer (nouveau nom)',
      arrive            : 'Arrivée',
      'fork slight right': 'Légèrement à droite',
      'fork slight left' : 'Légèrement à gauche'
    };
    const trMod = { left: 'à gauche', right: 'à droite', straight: 'tout droit' };

    return portions[0].steps.map(function (step, i) {
      const instr   = tr[step.instruction?.type]   || step.instruction?.type   || '—';
      const mod     = trMod[step.instruction?.modifier] || '';
      const street  = step.attributes?.name?.nom_1_gauche
                   || step.attributes?.name?.nom_1_droite
                   || 'Nom de rue inconnu';
      const dist    = (step.distance * 1000).toFixed(0);
      const dur     = (step.duration * 60).toFixed(1);
      return '<div style="padding:5px 0;border-bottom:1px solid #e0e0e0">'
           + '<strong>' + (i + 1) + '. ' + instr + (mod ? ' ' + mod : '') + '</strong><br>'
           + '➤ ' + street + '<br>'
           + '<em>' + dist + ' m — ' + dur + ' min</em>'
           + '</div>';
    }).join('');
  }

  /* ─── 5. Handler bouton ─── */
  async function onCalculate() {
    const btn          = document.getElementById('panel-itinerary-btn');
    const offerAddress = (document.getElementById('panel-address')?.textContent || '').replace(/📍\s*/,'').trim();
    const patientAddr  = (document.getElementById('panel-patient-address')?.value || '').trim();
    const profile      = document.getElementById('panel-transport-mode')?.value || 'car';
    const mapEl        = document.getElementById('panel-map');
    const summaryEl    = document.getElementById('panel-itinerary-summary');

    if (!offerAddress || !patientAddr) return; /* silencieux à l'auto-ouverture */

    btn.setAttribute('disabled', '');
    btn.textContent = 'Calcul en cours…';
    summaryEl.style.display = 'none';

    try {
      const [sLon, sLat] = await geocode(offerAddress);
      const [eLon, eLat] = await geocode(patientAddr);
      const route        = await getItinerary(sLon, sLat, eLon, eLat, profile);

      if (!route.geometry?.coordinates) throw new Error('Aucun itinéraire trouvé.');

      /* Afficher la carte */
      mapEl.style.display = 'block';
      initMap();
      setTimeout(function () { _map.invalidateSize(); }, 50);

      /* Tracer la route */
      if (_route) _map.removeLayer(_route);
      const coords = route.geometry.coordinates.map(function (c) { return [c[1], c[0]]; });
      _route = L.polyline(coords, { color: '#0063cb', weight: 4 }).addTo(_map);
      _map.fitBounds(_route.getBounds(), { padding: [20, 20] });

      /* Résumé */
      summaryEl.innerHTML =
        '<span class="fr-icon-road-map-line" aria-hidden="true"></span> '
        + '<strong>' + route.distance.toFixed(2) + ' km</strong> — '
        + '<strong>' + route.duration.toFixed(1) + ' min</strong>';
      summaryEl.style.display = 'block';

    } catch (e) {
      console.error('[itineraire]', e.message);
    } finally {
      btn.removeAttribute('disabled');
      btn.textContent = 'Calculer l\'itinéraire';
    }
  }

  /* Exposé pour le déclenchement automatique à l'ouverture */
  window._panelCalculateItinerary = onCalculate;

  /* ─── 6. Montage ─── */
  document.addEventListener('DOMContentLoaded', function () {
    document.getElementById('panel-itinerary-btn')
            ?.addEventListener('click', onCalculate);
  });

  /* ─── 7. Réinitialiser quand le panneau se ferme ─── */
  document.addEventListener('panel:close', function () {
    var mapEl = document.getElementById('panel-map');
    if (mapEl) mapEl.style.display = 'none';
    var summaryEl = document.getElementById('panel-itinerary-summary');
    if (summaryEl) { summaryEl.style.display = 'none'; summaryEl.innerHTML = ''; }
    if (_route && _map) { _map.removeLayer(_route); _route = null; }
  });

})();
</script>

</body>
</html>
