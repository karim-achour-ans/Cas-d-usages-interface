async function api(path) {

    const response = await fetch(
        API_BASE + path,
        {
            method: "GET",
            headers: {
                "Accept": "application/json",
                "access-token": AUTH.accessToken,
                "client": AUTH.client,
                "uid": AUTH.uid
            }
        }
    );

    if (!response.ok) {

        let body = "";

        try {
            body = await response.text();
        } catch (_) {}

        throw new Error(
            `HTTP ${response.status}\n${body}`
        );
    }

    return response.json();
}

async function getAllOrganisations() {

    let page = 1;

    let organisations = [];

    while (true) {

        const data =
            await api(`/organisations?page=${page}`);

        organisations.push(
            ...data.organisations
        );

        if (!data.meta.next_page) {
            break;
        }

        page = data.meta.next_page;
    }

    return organisations;
}
