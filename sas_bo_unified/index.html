<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arrière-guichet du SAS — Gestion des utilisateurs</title>

  <!-- DSFR (Système de Design de l'État) v1.12.1 — bundle local, hors-ligne -->
  <link rel="stylesheet" href="vendor/dsfr/dsfr.min.css">
  <link rel="stylesheet" href="vendor/utility/utility.min.css">
  <link rel="stylesheet" href="vendor/utility/icons/icons.min.css">
  <link rel="stylesheet" href="icons-inline.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="layout">
    <!-- ===== MENU VERTICAL GAUCHE ===== -->
    <aside class="sidebar">
      <div class="sidebar__brand">
        <span class="sidebar__brand-title">Arrière-guichet SAS</span>
        <span class="sidebar__brand-sub">Service d'Accès aux Soins</span>
      </div>
      <nav class="sidebar__nav" id="sidebar-nav" aria-label="Navigation principale"></nav>
      <div class="sidebar__foot">
        <label for="identity-select">Connecté en tant que</label>
        <select class="fr-select" id="identity-select"></select>
      </div>
    </aside>

    <!-- ===== CONTENU ===== -->
    <main class="main" role="main">
      <section id="view-list" class="bo-view"></section>
      <section id="view-create" class="bo-view" hidden></section>
      <section id="view-territoires" class="bo-view" hidden></section>
      <section id="view-departements" class="bo-view" hidden></section>
      <section id="view-support" class="bo-view" hidden></section>
    </main>
  </div>

  <!-- Modale simple (confirmation d'enregistrement) -->
  <div id="modal-root"></div>

  <script src="departements.js"></script>
  <script src="support.js"></script>
  <script src="app.js"></script>
</body>
</html>
