<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arrière-guichet SAS — Portail</title>

  <link rel="stylesheet" href="vendor/dsfr/dsfr.min.css">
  <link rel="stylesheet" href="vendor/utility/utility.min.css">
  <link rel="stylesheet" href="vendor/utility/icons/icons.min.css">
  <link rel="stylesheet" href="icons-inline.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="portal">
    <header class="portal__header">
      <div class="fr-container">
        <div>
          <div class="portal__brand-title">Arrière-guichet SAS</div>
          <div class="portal__brand-sub">Service d'Accès aux Soins — Portail des back-offices</div>
        </div>
        <div class="portal__identity">
          <label for="identity-select">Connecté en tant que (démo)</label>
          <select class="fr-select" id="identity-select"></select>
        </div>
      </div>
    </header>
    <main class="portal__main">
      <div class="fr-container">
        <p class="portal__lead">Sélectionnez un back-office. Seuls ceux pour lesquels vous êtes habilité sont accessibles.</p>
        <div class="portal__grid" id="portal-grid"></div>
      </div>
    </main>
  </div>

  <script src="identities.js"></script>
  <script src="portal.js"></script>
</body>
</html>
